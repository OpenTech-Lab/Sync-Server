name: Server CI

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "server/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: server

jobs:
  # ──────────────────────────────
  # Rust: format, lint, test
  # ──────────────────────────────
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sync_test
          POSTGRES_USER: sync
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://sync:testpassword@localhost:5432/sync_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production
      INSTANCE_NAME: ci-test
      INSTANCE_DOMAIN: localhost

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # ──────────────────────────────
  # Dashboard: lint + build
  # ──────────────────────────────
  dashboard:
    name: Dashboard (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Disable telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1
