services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_dev
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    # Not exposed externally – only reachable inside the Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sync -d sync_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Not exposed externally – only reachable inside the Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://sync:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/sync_dev
      REDIS_URL: redis://redis:6379
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
    # Not exposed externally – traffic enters only via nginx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:8080
    # Not exposed externally – traffic enters only via nginx
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount your TLS certificates here.
      # For local dev, generate a self-signed cert:
      #   mkdir -p nginx/certs
      #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
      #     -keyout nginx/certs/server.key -out nginx/certs/server.crt \
      #     -subj "/CN=localhost"
      # For production, use Certbot / Let's Encrypt volumes instead.
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
