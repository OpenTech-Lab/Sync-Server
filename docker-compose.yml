name: sync-server

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_dev
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sync -d sync_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://sync:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/sync_dev
      REDIS_URL: redis://redis:6379
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:8080
      SYNC_SERVER_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set these in your .env file – no hardcoding needed
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      # Dummy self-signed cert – only used for the default_server IP-block
      - ./nginx/certs:/etc/nginx/certs:ro
      # Let's Encrypt real certs (written by certbot service below)
      - letsencrypt:/etc/letsencrypt:ro
      # Webroot for ACME HTTP challenge
      - certbot_webroot:/var/www/certbot:ro
    # envsubst replaces only ${INSTANCE_DOMAIN};
    # nginx's own $variables (no braces) are left untouched.
    command:
      - /bin/sh
      - -c
      - "envsubst '$$INSTANCE_DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s   # give nginx time to start + certbot to run
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renew certs every 12 h; certbot skips if not due yet
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped

volumes:
  postgres_data:
  letsencrypt:
  certbot_webroot:
