worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_buffers    16 8k;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ── Security – hide version ───────────────────────────────────────────────
    server_tokens off;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # General API: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # Auth endpoints: 5 req/s per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    # WebSocket connections: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

    # ── Connection limiting ──────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    upstream dashboard_backend {
        server dashboard:3000;
        keepalive 16;
    }

    # ── Block direct IP access (HTTP) ─────────────────────────────────────────
    # Requests arriving with a bare IP as Host (or no Host) are dropped silently.
    # SSH (port 22) is handled by the OS and never reaches nginx.
    server {
        listen 80 default_server;
        server_name _;

        # Return no response – drops the TCP connection immediately
        return 444;
    }

    # ── Block direct IP access (HTTPS) ───────────────────────────────────────
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        return 444;
    }

    # ── Main virtual host – API ───────────────────────────────────────────────
    # Replace 'yourdomain.com' with your actual domain (or use env substitution).
    server {
        listen 80;
        server_name yourdomain.com;

        # Redirect all HTTP → HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name yourdomain.com;

        # ── TLS ──────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Body size ─────────────────────────────────────────────────────────
        client_max_body_size 10m;
        client_body_timeout  15s;
        client_header_timeout 15s;

        # ── Connection limit per IP ───────────────────────────────────────────
        limit_conn conn_limit 100;

        # ── Auth endpoints (strict rate limit) ───────────────────────────────
        location ~ ^/api/(auth|login|register|token) {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── WebSocket upgrade ─────────────────────────────────────────────────
        location /ws {
            limit_req zone=ws_limit burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Health / readiness (no rate limit, internal check) ────────────────
        location ~ ^/(health|ready)$ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }
    }

    # ── Dashboard virtual host ────────────────────────────────────────────────
    server {
        listen 80;
        server_name admin.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name admin.yourdomain.com;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # Restrict dashboard to internal/VPN IPs only (edit as needed)
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny  all;

        client_max_body_size 5m;
        limit_conn conn_limit 20;
        limit_req  zone=api_limit burst=30 nodelay;

        location / {
            proxy_pass         http://dashboard_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }
    }
}
